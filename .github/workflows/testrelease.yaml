name: Release from CSV

on:
  workflow_call:
    inputs:
      CSV_FILE:
        description: path of csv file
        required: false
        type: string
        default: ./release/Repo_release/repolist.csv
    secrets:
      SLACK_WEBHOOK_URL:
        required: true
      TOKEN:
        required: true

jobs:
  create-releases-from-csv:
    name: Create Releases from CSV
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Create Releases from CSV
        run: |
          while IFS=, read -r REPO TAG ONLY_TAG BRANCH LATEST BODY PRE_RELEASE DRAFT OBJECT_SHA MESSAGE; do
            if [[ "$REPO" == "REPO" ]]; then
              echo "CSV header line ignoring";
              continue;
            fi

            REPO=$(echo "$REPO" | tr -d '"')

            echo "REPO === $REPO"

            PRE_RELEASE=$(echo "$PRE_RELEASE" | tr '[:upper:]' '[:lower:]')
            DRAFT=$(echo "$DRAFT" | tr '[:upper:]' '[:lower:]')
            ONLY_TAG=$(echo "$ONLY_TAG" | tr '[:upper:]' '[:lower:]')

            [[ "$PRE_RELEASE" == "true" ]] && PRE_RELEASE=true || PRE_RELEASE=false
            [[ "$DRAFT" == "true" ]] && DRAFT=true || DRAFT=false
            [[ "$ONLY_TAG" == "true" ]] && ONLY_TAG=true || ONLY_TAG=false

            # Output key-value pairs
            echo "REPO: $REPO"
            echo "TAG: $TAG"
            echo "ONLY_TAG: $ONLY_TAG"
            echo "BRANCH: $BRANCH"
            echo "LATEST: $LATEST"
            echo "BODY: $BODY"
            echo "PRE_RELEASE: $PRE_RELEASE"
            echo "DRAFT: $DRAFT"
            echo "OBJECT_SHA: $OBJECT_SHA"
            echo "MESSAGE: $MESSAGE"
            echo "-----------------------------"

            # Conditionally execute curl command based on ONLY_TAG value
            if [[ "$ONLY_TAG" == "true" ]]; then

              # Construct data payload for tag
              data='{
                  "tag": "'"$TAG"'",
                  "message": "'"$MESSAGE"'",
                  "object": "'"$OBJECT_SHA"'",
                  "type": "commit"
              }'

              # Debugging output
              echo "DEBUG: Data payload for tag:"
              echo "data: $data"

              # Run curl command for tag and handle errors
              if response=$(curl -L -sS \
                  -X POST \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  https://api.github.com/repos/shubham17998/$REPO/git/tags \
                  -d "$data"); then
                  echo "Tag created successfully."
                  echo "GitHub API Response: $response"
                  echo "git tag: "
                  curl -L \ -H "Accept: application/vnd.github+json" \ -H "Authorization: Bearer ${{ secrets.TOKEN }}" \ -H "X-GitHub-Api-Version: 2022-11-28" \ https://api.github.com/repos/shubham17998/$REPO/tags
              else
                  echo "Error creating tag."
                  echo "GitHub API Response: $response"
                  exit 1
              fi
            else

              # Construct data payload for release
              data='{
                "tag_name": "'"$TAG"'",
                "name": "'"$TAG"'",
                "target_commitish": "'"$BRANCH"'",
                "body": "'"$BODY"'",
                "draft": '$DRAFT',
                "prerelease": '$PRE_RELEASE'
              }'
              
              # Debugging output
              echo "DEBUG: Data payload for release:"
              echo "data: $data"

              # Run curl command for release
              curl -L \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                https://api.github.com/repos/shubham17998/$REPO/releases \
                -d "$data"
            fi
          done < "${{ inputs.CSV_FILE }}"
      - uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,author,commit,workflow,job # selectable (default: repo,message)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} # required
        if: failure() # Pick up events even if the job fails or is canceled.
